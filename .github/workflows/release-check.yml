name: Release Check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-check:
    name: Release readiness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check public release surface
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          import subprocess
          from pathlib import Path

          failures = []
          required_paths = [
              "README.md",
              "LICENSE",
              "NOTICE",
              "CITATION.cff",
              "AGENTS.md",
              "CLAUDE.md",
              ".github/CODE_OF_CONDUCT.md",
              ".github/CONTRIBUTING.md",
              ".github/SECURITY.md",
              ".github/pull_request_template.md",
              ".github/ISSUE_TEMPLATE/bug_report.md",
              ".github/ISSUE_TEMPLATE/skill_proposal.md",
              ".github/workflows/ci.yml",
              ".github/workflows/link-check.yml",
              ".github/workflows/release-check.yml",
              "docs/README.md",
              "docs/release/CHANGELOG.md",
              "docs/release/ROADMAP.md",
              "install/install.ps1",
              "install/install.sh",
              "install/routing-directive.md",
              ".claude-plugin/plugin.json",
              ".claude-plugin/marketplace.json",
          ]
          forbidden_paths = [
              ".codex",
              ".claude/settings.local.json",
              "docs/release/09-release-checklist.md",
          ]

          for relative in required_paths:
              if not Path(relative).exists():
                  failures.append(f"missing required public path: {relative}")

          tracked = subprocess.check_output(
              ["git", "ls-files"], text=True, encoding="utf-8"
          ).splitlines()
          tracked_set = set(tracked)

          for relative in forbidden_paths:
              if relative in tracked_set or any(
                  item.startswith(f"{relative}/") for item in tracked
              ):
                  failures.append(f"forbidden tracked path: {relative}")

          commit_messages = subprocess.check_output(
              ["git", "log", "--format=%B"], text=True, encoding="utf-8"
          )
          attribution_patterns = [
              "Co-authored-by:",
              "Generated by",
              "generated-by",
          ]
          for pattern in attribution_patterns:
              if pattern in commit_messages:
                  failures.append(f"git history: contains {pattern!r}")

          with open(".claude-plugin/plugin.json", encoding="utf-8") as handle:
              plugin = json.load(handle)
          with open(".claude-plugin/marketplace.json", encoding="utf-8") as handle:
              marketplace = json.load(handle)
          citation = Path("CITATION.cff").read_text(encoding="utf-8")
          changelog = Path("docs/release/CHANGELOG.md").read_text(encoding="utf-8")

          plugin_version = plugin.get("version")
          marketplace_version = marketplace.get("metadata", {}).get("version")
          citation_match = re.search(r"^version:\s*(.+)$", citation, re.MULTILINE)
          citation_version = citation_match.group(1).strip().strip("'\"") if citation_match else None

          if not plugin_version:
              failures.append(".claude-plugin/plugin.json: missing version")
          if marketplace_version != plugin_version:
              failures.append(
                  ".claude-plugin/marketplace.json: metadata.version does not match plugin.json"
              )
          if citation_version != plugin_version:
              failures.append("CITATION.cff: version does not match plugin.json")
          version_heading = (
              rf"^##\s+\[?{re.escape(plugin_version)}\]?(?:\s|$)"
              if plugin_version
              else None
          )
          if version_heading and not re.search(version_heading, changelog, re.MULTILINE):
              failures.append("CHANGELOG.md: missing current version section")

          claude_path = Path("CLAUDE.md")
          agents_path = Path("AGENTS.md")
          if claude_path.exists() and agents_path.exists():
              stage = subprocess.check_output(
                  ["git", "ls-files", "--stage", "CLAUDE.md"],
                  text=True,
                  encoding="utf-8",
              ).split()
              if stage and stage[0] == "120000":
                  target = subprocess.check_output(
                      ["git", "show", "HEAD:CLAUDE.md"],
                      text=True,
                      encoding="utf-8",
                  ).strip().replace("\\", "/")
                  if target != "AGENTS.md":
                      failures.append("CLAUDE.md: symlink target is not AGENTS.md")
              elif claude_path.read_text(encoding="utf-8") != agents_path.read_text(
                  encoding="utf-8"
              ):
                  failures.append("CLAUDE.md: content does not match AGENTS.md")

          if failures:
              print("Release readiness failures:")
              print("\n".join(failures))
              raise SystemExit(1)

          print("Public release surface passed.")
          PY

      - name: Check installer syntax
        shell: bash
        run: |
          bash -n install/install.sh
          pwsh -NoLogo -NoProfile -Command '
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path "install/install.ps1"), [ref] $tokens, [ref] $errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_ }
              exit 1
            }
          '
