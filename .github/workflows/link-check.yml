name: Link Check

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/link-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    name: Link check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --timeout 20
            --max-concurrency 8
            --retry-wait-time 2
            --max-retries 2
            --accept 200,204,206,301,302,403,429
            README.md
            AGENTS.md
            docs/**/*.md
            .github/**/*.md
            skills/**/*.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
